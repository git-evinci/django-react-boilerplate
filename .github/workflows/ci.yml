name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Silence the GitHub Actions deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-lint-and-test:
    name: Backend (Django & Code Quality)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit standalone
        run: pip install pre-commit

      - name: Set up Pre-commit Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run Pre-commit Hooks (Ruff & Prettier)
        run: pre-commit run --all-files

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up Poetry Cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install Backend Dependencies
        run: poetry install --no-interaction

      - name: Run Pytest
        run: poetry run pytest

  frontend-build:
    name: Frontend (Vite Build Check)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Updated to match your local Node v22!
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Verify Frontend Build
        run: npm run build

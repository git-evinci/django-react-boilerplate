services:
  db:
    image: postgres:15-alpine
    container_name: evinci_db_prod
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evinci_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../
      dockerfile: docker/django/Dockerfile
    container_name: evinci_django_prod
    restart: always
    # Gunicorn is used instead of runserver for production performance/security
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app/backend
      - ../frontend/dist:/app/frontend/dist
      - ../scripts:/app/scripts
    env_file:
      - ../.env.prod
    environment:
      - DJANGO_ENV=production
    ports:
      - "8000:8000"

volumes:
  postgres_data:
